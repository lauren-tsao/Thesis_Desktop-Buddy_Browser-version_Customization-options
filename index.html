      <div class="content">

        <div class="prototype-container">
          <iframe
            src="https://embed.figma.com/proto/OvzLIxjBdIgXOPED8MMv3k/Thesis-Project---MiniKin?node-id=995-178&scaling=fill&content-scaling=fill&starting-point-node-id=995%3A178&page-id=995%3A126&embed-host=share">

    <div id="minikin" aria-label="MiniKin" role="button"></div>

      <div id="bubbleInputRow">
        <input id="bubbleInput" type="text" placeholder="What's on your mind?" aria-label="Chat input" />
        <button id="bubbleSend" type="button">Send</button>
      </div>
    </div>

    <div class="loading-text">loading...</div>

    <div class="browser-background"></div>

    <!-- LOTTIE PLAYER -->
